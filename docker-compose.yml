services:
  rag:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      RAG_STORAGE_DIR: /app/storage
      RAG_REPORTS_DIR: /app/reports
    volumes:
      - .:/app
    working_dir: /app
    stdin_open: true
    tty: true
    entrypoint: ["python", "-m", "rag_eval_demo"]
